name: SCAD to STL Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenSCAD
        run: sudo apt-get update && sudo apt-get install -y openscad

      - name: Convert SCAD to STL
        run: |
          openscad -o part_top.stl part_top.scad
          openscad -o part_bottom.stl part_bottom.scad
          openscad -o part_bracket.stl part_bracket.scad

      - name: Upload STL Artifact
        uses: actions/upload-artifact@v4
        with:
          name: converted-3d-model
          path: '*.stl'
